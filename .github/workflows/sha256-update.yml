name: Update SHA256

on:
  push:
    branches: [main, master]
    paths:
      - 'skills/**'
      - 'generate-skill/**'
      - 'buckets.json'

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Recalculate skills.json and plugin manifests
        run: ./bin/swissknifeman registry

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json .claude-plugin/marketplace.json \
            skills/*/.claude-plugin/plugin.json \
            generate-skill/.claude-plugin/plugin.json
          if git diff --staged --quiet; then
            echo "No changes to registry or plugin manifests"
          else
            git commit -m "chore: update registry hashes and plugin manifests"
            git push
          fi
