# ============================================================================
# Режим auto-approve хука. Один из четырёх. После смены — ПЕРЕЗАПУСТИ Claude Code
# (хуки и режим читаются при старте сессии).
#
#   strict     — allowlist-first: «что явно не разрешено — на обычный промпт».
#                Безопасный дефолт. Авто-одобряет read-only команды (включая
#                компаунд), катастрофичное — deny, мутации — промпт.
#
#   permissive — denylist-first: «что явно не запрещено — разрешено».
#                Меньше промптов. Незнакомая команда вне денилиста одобряется.
#                Только доверенный проект.
#
#   bypass     — максимум автономии: авто-подтверждение диалога плана (ExitPlanMode)
#                + одобрение любых команд, кроме катастрофичных (deny_hard).
#                Для полного отключения промптов добавь в settings проекта:
#                "permissions": { "defaultMode": "bypassPermissions" }.
#                Только доверенные проекты/контейнеры.
#
#   off        — выключено: всегда обычный permission-флоу.
# ============================================================================

MODE=strict
