name: Sync to Brain

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'academici/swissknifeman'
    steps:
      - uses: actions/checkout@v4

      - name: Update registry hashes
        run: ./sync.sh --update-registry

      - name: Sync to brain (requires BRAIN_DEPLOY_KEY)
        env:
          BRAIN_PATH: /tmp/brain
          BRAIN_REPO: ${{ secrets.BRAIN_REPO_URL }}
        run: |
          if [ -z "${BRAIN_REPO:-}" ]; then
            echo "BRAIN_REPO_URL secret not configured, skipping sync"
            exit 0
          fi
          git clone "$BRAIN_REPO" "$BRAIN_PATH"
          ./sync.sh --brain "$BRAIN_PATH" --update-registry
          cd "$BRAIN_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: sync skills from academici/swissknifeman"
          git push
