# ============================================================================
# Режим «единой памяти» — какой бэкенд использует memory.sh. Один из четырёх.
# После смены — перезапусти сессию (режим читается при вызове).
#
#   file        — один общий store на brain (плоские markdown-факты). Проще
#                 всего: remember пишет факт + индекс, recall грепает по store.
#
#   federation  — источник истины = СВОИ memory/ каждого участника (его
#                 .claude/memory + нативная память Claude Code) + общий store.
#                 recall читает по ВСЕМ участникам и ранжирует по совпадениям.
#                 Git-прозрачно, без демона. ← дефолт.
#
#   agentmemory — remember/recall через HTTP AgentMemory (демон на Brain,
#                 namespace = имя brain). Семантический поиск; если демон спит —
#                 status честно сообщает, без падения.
#
#   off         — выключено: remember/recall ничего не делают.
# ============================================================================

MODE=federation
